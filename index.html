<html>

<head>


    <meta charset="UTF-8">

    <style>
        /*MAIN BACKGROUND ////////////////////////*/
        body {
        
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;

            /*temp*/
            background-color:white;
            /*temp*/

            font-family: 'Courier New', Courier, monospace; 
            overflow-x: hidden; /*cant scroll horizontally*/
            overflow-y: auto; /*mobile scrolling*/
        }

         /* PLAY BUTTON STUFF*/
        #play {

                margin-top: 50px;
                z-index: 100;   /*bring play button to front*/
                
            }

        #play-clicky{

            padding: 15px 60px;
            font-family: 'Courier New', Courier, monospace;
            font-size : 24px;
            font-weight: 900;

            /*TEMP THIS WILL BE AN IMAGE*/

            background-color: rgb(51, 102, 68);

             /*TEMP THIS WILL BE AN IMAGE*/


            color: rgb(114, 114, 114);

            cursor: not-allowed;
            transition: all 0.3s ease;
        }


        #play-clicky.on {

             /*TEMP THIS WILL BE AN IMAGE*/
            background-color: rgb(90, 255, 145);
             /*TEMP THIS WILL BE AN IMAGE*/

            color: white;
            cursor: pointer;
            transform: scale(1.1);
            
        }

        /* BACKGROUND VIDEO BECAUSE GIF WAS TOO LAGGY*/
        /*i watched video for this*/
        #bg-video {

            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1; 
            object-fit: cover;
        }

        /*selected card lift*/
        .selected {

            transform: translateY(-30px) scale(1.1) !important;
            z-index: 50;
        }

        /* from tutorial video*/
        .is-played {

            position: fixed !important; 
            left: 50%;
            top: 50%;
            margin: 0;
            transform: translate(-50%, -50%) scale(2) rotate(0deg) !important;
            z-index: 1000; /*bring played card to front*/
            transition: all 0.6s ease cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }

         /*GRID AND CARD STUFF//////////////////////*/


        .grid {

            display: grid;
            grid-template-columns: repeat(4, 120px); 
            grid-template-rows: repeat(3, 170px);
            margin-top: 50px;
            max-width: 800px;

            /* FOR SOME GOD FORSAKEN REASON THIS LINE OF CODE IS NECCESSARY!!!! IDK WHY
            DO NOT TOUCH!*/
            gap: 5vw;  
            /* ``````````````````````````````````*/
            
            perspective: 1200px; /* give perspective to grid */
        }

        .card {
            /*INDIVIDUAL CARDS ////////////////////////*/
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;  

            background-color: white;
            color: black;

            border-radius: 10px;
            
            /*animations REMOVED!!!!!!!!!!!!!!!!!!!!!!! FUCK!
            animation: bobbing 3s infinitewhe ease-in-out; */

            text-decoration: none;
            font-weight: 900;

            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.5);

            
            transform-style: preserve-3d; /* 3d transformer*/
            
            /* snap back animation*/
            transition: transform 0.05s cubic-bezier(0.18, 0.89, 0.32, 1.28), 
                        box-shadow 0.05s ease;
            
            cursor: pointer;
            aspect-ratio: 2.5 / 3.5;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* grid */
        
        /*testing lining them up*/

        .card-top-left { grid-column: 2; grid-row: 1; 

            background-image: url(https://evil-farticle.github.io/NEWSITE/images/Skreeg.JPG)

        }

        .card-top-right { grid-column: 3; grid-row: 1; 
        
            background-image: url(https://evil-farticle.github.io/NEWSITE/images/cboy.JPG)

        }

        .card-mid-left { grid-column: 1; grid-row: 2; 
        
            background-image: url(https://evil-farticle.github.io/NEWSITE/images/joe.JPG)

        }

        .card-mid-right { grid-column: 4; grid-row: 2; 
        
            background-image: url(https://evil-farticle.github.io/NEWSITE/images/napkin.JPG)

        }

        .card-bot-left { grid-column: 2; grid-row: 3; 

            background-image: url(https://evil-farticle.github.io/NEWSITE/images/satan.JPG)

        }

        .card-bot-right { grid-column: 3; grid-row: 3; 

            background-image: url(https://evil-farticle.github.io/NEWSITE/images/paythb.JPG)
        }

        /* hover lift */

        .card:hover {

            box-shadow: 0 5px 10px black;
            z-index: 10; /*bring hovered card to front*/
        }

       	/*bobbing REMOVED!!! ts too hard
        @keyframes bobbing {
        
        	0% { margin-bottom: 0px;}
        	50% { margin-bottom: 8px;}
        	100% { margin-bottom: 0px;}
            
        }*/
        
        /*stacks cards vertically if window is shrunk*/
        @media (max-width: 700px) {

            	display: flex; 
                flex-direction: column; 
                padding: 40px; 
                
                }

            .card {  /* make cards centered or smaller screenz */
            	width: 140px; 
                margin: 0 auto; 
                }
        }

<body>



    <video autoplay muted loop id="bg-video">

        <source src="Background.mp4" type="video/mp4">

    </video>

<!-- div for grid and card classes for specific cards WHY DOES THIS COMMENT NEED TO BE DIFFEREBt?>!?>!!>--> 
    <div class="grid" id="card-grid"> 
  
        <a href="#" class="card card-top-left" data-url="https://evil-farticle.github.io/NEWSITE/cardone"></a>
        <a href="#" class="card card-top-right" data-url="https://evil-farticle.github.io/NEWSITE/cardtwo"></a>
    
        <a href="#" class="card card-mid-left" data-url="https://evil-farticle.github.io/NEWSITE/cardthree"></a>
        <a href="#" class="card card-mid-right" data-url="https://evil-farticle.github.io/NEWSITE/cardfour"></a>
    
        <a href="#" class="card card-bot-left" data-url="https://evil-farticle.github.io/NEWSITE/cardfive"></a>
        <a href="#" class="card card-bot-right" data-url="https://evil-farticle.github.io/NEWSITE/cardsix"></a>
        
    </div>

    <div id="play">

        <button id="play-clicky" disabled>PLAY CARD</button>

    </div>



    <!-- SCRIPT!!! STUFF HELP ME PLEAAASE!!!!! --> 
    <script>
    /* I found this portion of the script in https://github.com/topics/hover-effects this collection*/
    /*card hover move 3d looking script*/
        
        const cards = document.querySelectorAll('.card'); /*changed this to match classes*/

        /* my stuff for play card*/
        const playButton = document.getElementById('play-clicky');

        const grid = document.getElementById('card-grid');

        let selected = null;

        cards.forEach(card => {
        /* CARD TILT STUFF/////////////////////*/
        /*event listener to track mouse movement*/
            card.addEventListener('mousemove', (e) => {
                    if (card.classList.contains('is-played')) return; /*if card is already played, dont do the hover effect*/
            
                    const rect = card.getBoundingClientRect(); /*script to getg bounding box*/
                
                    const x = e.clientX - rect.left; 
                    const y = e.clientY - rect.top;  
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    /*tilt*/
                    const rotateX = ((y - centerY) / centerY) * -25; 
                    const rotateY = ((x - centerX) / centerX) * 25;

                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.15, 1.15, 1.15)`; /*thank you github for this algorithm*/
                
            }
        );
        /* reset tilt script*/
        card.addEventListener('mouseleave', () => {
            
                /*event listener to detect when mouse leaves so that it snaps back 2 normal :3*/
                if (!card.classList.contains('selected')) {
                    
                    card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`; /* snap back to normal position and size*/
                }

            }
        );

        /*card select script*/
        
        card.addEventListener('click', (e) => {

                e.preventDefault();


                // deselect script
                if (card.classList.contains('selected')) {

                    card.classList.remove('selected');

                    selected = null;

                    playButton.disabled = true;
                    playButton.classList.remove('on');

                    return;
                }

                // if not selected, select it and deselect others
                else {
                    
                    cards.forEach(c => c.classList.remove('selected'));

                    card.classList.add('selected');

                    selected = card;

                    playButton.disabled = false;
                    playButton.classList.add('on');

                }


            });

        });

            /*play button script*/
        playButton.addEventListener('click', () => {


            if (selected) {

                playButton.disabled = true;
                playButton.classList.remove('on');

                /*dim*/
                grid.style.opacity = '0.3';

                selected.classList.remove('selected');
                selected.classList.add('is-played');

                /*redirect delay*/
                setTimeout(() => {

                    const url = selected.getAttribute('data-url');

                    //redirect to url if it exists

                    if (url) {

                        window.location.href = url;
                    }
                    
                }, 1000);
            }
        });

    </script>

</body>
